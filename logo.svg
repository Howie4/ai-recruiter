<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00C9B8"/>
      <stop offset=".45" stop-color="#2B7FFF"/>
      <stop offset="1" stop-color="#7C5CFC"/>
    </linearGradient>
    <linearGradient id="sheen" x1="50" y1="0" x2="50" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity=".18"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="star-g" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#FFE94D"/>
      <stop offset="1" stop-color="#FFB800"/>
    </linearGradient>
  </defs>

  <!-- 圆角背景 -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- 顶部光泽 -->
  <rect width="100" height="48" rx="22" fill="url(#sheen)"/>

  <!-- 人物轮廓：头部 -->
  <circle cx="47" cy="37" r="13.5" fill="white" opacity=".93"/>
  <!-- 人物轮廓：肩部弧线 -->
  <path d="M18 80 C18 60 76 60 76 80 L76 84 L18 84 Z" fill="white" opacity=".93"/>

  <!-- 右上角轨道弧（AI 扫描感） -->
  <path d="M58 25 A26 26 0 0 1 73 52" stroke="white" stroke-width="1.8"
        stroke-linecap="round" opacity=".28" stroke-dasharray="3 4"/>

  <!-- AI 四角星 -->
  <g transform="translate(76,22)">
    <path d="M0,-9.5 L2.2,-2.2 L9.5,0 L2.2,2.2 L0,9.5 L-2.2,2.2 L-9.5,0 L-2.2,-2.2 Z"
          fill="url(#star-g)"/>
  </g>
  <!-- 小卫星点（呼应 AI 扫描） -->
  <circle cx="22" cy="46" r="2.2" fill="white" opacity=".38"/>
  <circle cx="27" cy="30" r="1.5" fill="white" opacity=".28"/>
</svg>
