<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- 深邃背景渐变 -->
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1B3E"/>
      <stop offset=".55" stop-color="#0F2460"/>
      <stop offset="1" stop-color="#1A0B3B"/>
    </linearGradient>

    <!-- 人物身体渐变（主色调） -->
    <linearGradient id="figure" x1="0" y1="30" x2="0" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.88)"/>
    </linearGradient>

    <!-- 扫描环渐变 -->
    <linearGradient id="ring" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00E5D1"/>
      <stop offset=".5" stop-color="#2B7FFF"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>

    <!-- 扫描环发光 -->
    <filter id="ring-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- 星点发光 -->
    <filter id="star-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- 人物发光 -->
    <filter id="figure-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── 背景 ── -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- 背景中心辉光 -->
  <ellipse cx="50" cy="50" rx="38" ry="35" fill="#1E3A8A" opacity=".35"/>
  <ellipse cx="50" cy="40" rx="25" ry="20" fill="#2B7FFF" opacity=".12"/>

  <!-- ── AI 扫描环（核心科技感） ── -->
  <!-- 外发光层 -->
  <circle cx="50" cy="40" r="24" stroke="url(#ring)" stroke-width="5"
          stroke-dasharray="100 50" stroke-dashoffset="-12"
          opacity=".35" filter="url(#ring-glow)" stroke-linecap="round"/>
  <!-- 扫描环本体（缺口在底部，形成开放感） -->
  <circle cx="50" cy="40" r="22" stroke="url(#ring)" stroke-width="2.2"
          stroke-dasharray="105 35" stroke-dashoffset="-10"
          opacity=".9" stroke-linecap="round"/>

  <!-- ── 人物轮廓 ── -->
  <g filter="url(#figure-glow)">
    <!-- 头部 -->
    <circle cx="50" cy="38" r="12" fill="url(#figure)"/>
    <!-- 肩部 / 身体 -->
    <path d="M22 76 C22 59 78 59 78 76 L78 80 L22 80 Z" fill="url(#figure)"/>
  </g>

  <!-- ── 顶部四角星（AI 核心） ── -->
  <g filter="url(#star-glow)">
    <path d="M50 13
             L51.8 18.2
             L57.2 20
             L51.8 21.8
             L50 27
             L48.2 21.8
             L42.8 20
             L48.2 18.2 Z"
          fill="#00E5D1"/>
  </g>

  <!-- 扫描环上的高光节点 -->
  <circle cx="50" cy="18.2" r="2.2" fill="#00E5D1" opacity=".9"/>
  <circle cx="71.6" cy="29.6" r="1.6" fill="#2B7FFF" opacity=".8"/>
  <circle cx="71.6" cy="50.4" r="1.6" fill="#A855F7" opacity=".8"/>
  <circle cx="28.4" cy="29.6" r="1.6" fill="#2B7FFF" opacity=".6"/>

  <!-- 装饰光点 -->
  <circle cx="18" cy="22" r="1.4" fill="#00E5D1" opacity=".4"/>
  <circle cx="82" cy="68" r="1.2" fill="#A855F7" opacity=".4"/>
  <circle cx="14" cy="62" r="1"   fill="#2B7FFF" opacity=".35"/>
</svg>
